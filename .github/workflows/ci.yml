name: CI-Validation

on:
  push:
    branches:
      - 'feature/*' # Se activa solo cuando subes ramas que empiecen por feature/

jobs:
  quality-check:
    name: "Validación de Código"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Validando código..."

  create-pr:
    name: "Auto-Create PR"
    needs: quality-check # Solo se crea si los tests pasan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          base: main
          title: "Auto PR: ${{ github.ref_name }}"
          body: "Esta PR fue creada automáticamente por el flujo de CI."